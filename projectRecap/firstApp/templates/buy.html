{% extends 'main.html' %}
{% block content %}


<form action="" method="post">
    <div class="card mt-5" style="width: 40rem; ">
  <div class="card-body">
{% csrf_token%}
<div class="mb-3">
    <label for="phoneNumber" class="form-label">Enter Your Phone Number Here</label>
    <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" aria-describedby="phoneHelp">
    <div id="phoneHelp" class="form-text">Please ensure to input a phone number that is registered to safaricom Mpesa services eg 07...</div>
  </div>
  <div class="mb-3">
    <label for="amount" class="form-label">Enter The Amount you wish to pay</label>
    <input type="text" class="form-control" id="amount" name="amount">
        <div id="amountHelp" class="form-text">Please input your desired Amount.</div>

  </div>
<button type="submit" class="btn btn-primary">Make Payment</button>
 </div>
</div>
</form>
